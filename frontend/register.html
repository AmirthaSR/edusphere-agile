<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — EduSphere</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .logo { text-align: center; margin-bottom: 8px; }
    .logo h1 { color: #1a73e8; font-size: 28px; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    h2 { text-align: center; color: #333; margin: 20px 0; font-size: 22px; }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border 0.3s;
      outline: none;
    }
    input:focus { border-color: #1a73e8; }
    button {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #1558b0; }
    #message {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      padding: 8px;
      border-radius: 6px;
    }
    #message.success { background: #e6f4ea; color: #2e7d32; }
    #message.error { background: #fdecea; color: #c62828; }
    #message.info { background: #e8f0fe; color: #1a73e8; }
    .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
    .footer a { color: #1a73e8; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>EduSphere</h1>
      <p>Smart Learning Platform</p>
    </div>
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <p id="message"></p>
    <div class="footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
